services:
  mariadb:
    image: lscr.io/linuxserver/mariadb:latest
    container_name: movie_picker_db
    networks:
      - movienet
    environment:
      - PUID=1000
      - GUID=1000
      - TZ=Europe/Copenhagen
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
    volumes:
      - ./:/config
    ports:
      - 3306:3306
    restart: unless-stopped

  adminer:
    image: adminer:latest
    networks:
      - movienet
    restart: unless-stopped
    ports:
      - 3001:8080

  backend:
    build: ./app
    container_name: movie_picker_backend
    env_file:
      - .env
    networks:
      - movienet
    env_file:
      - .env
    environment:
      - PUID=1000
      - GUID=1000
      - TZ=Europe/Copenhagen
      - MOVIE_PICKER_DB_PASSWORD=${MOVIE_PICKER_DB_PASSWORD}
      - TMDB_API_TOKEN=${TMDB_API_TOKEN}
    volumes:
      - ./app:/app
    ports:
      - 8000:8000
    restart: unless-stopped

networks:
  movienet:
